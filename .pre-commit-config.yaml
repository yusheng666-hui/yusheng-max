repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        args: ["--config", "src/backend/pyproject.toml"]
        files: ^src/backend/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: ["check", "--fix", "--config", "src/backend/pyproject.toml"]
        files: ^src/backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        args: ["--config-file", "src/backend/pyproject.toml", "src/backend/app/"]
        language: system
        types: [python]
        pass_filenames: false

      - id: dart-format
        name: dart format
        entry: dart format
        args: ["src/flutter_app/lib/", "src/flutter_app/test/"]
        language: system
        types: [dart]
        pass_filenames: false

      - id: dart-analyze
        name: dart analyze
        entry: dart analyze
        args: ["src/flutter_app/"]
        language: system
        types: [dart]
        pass_filenames: false
