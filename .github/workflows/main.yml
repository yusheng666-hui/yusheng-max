name: Main CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  flutter-analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.x"
          channel: stable
      - run: flutter pub get
      - run: dart analyze

  flutter-test:
    name: Flutter test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.x"
          channel: stable
      - run: flutter pub get
      - run: flutter test

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black==24.1.0 ruff==0.1.14 mypy==1.8.0
      - run: black --check --diff app/ tests/
      - run: ruff check app/ tests/
      - run: mypy app/

  pytest:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest

  build-apk:
    name: Build APK
    needs: [flutter-analyze, flutter-test, python-lint, pytest]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.x"
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/flutter_app/build/app/outputs/flutter-apk/app-debug.apk
