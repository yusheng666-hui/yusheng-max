name: pose_craft
description: AI-powered photography pose and angle recommendation app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5

  # ML - On Device
  google_mlkit_pose_detection: ^0.10.0
  google_mlkit_face_detection: ^0.10.0
  tflite_flutter: ^0.10.3

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Local Storage
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0

  # Voice
  flutter_tts: ^3.8.0

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Utilities
  uuid: ^4.2.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  drift_dev: ^2.15.0
  riverpod_generator: ^2.3.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/poses/
    - assets/images/
    - assets/fonts/
    - assets/presets/
    - assets/pois/

  shaders:
    - shaders/hald_clut.frag
